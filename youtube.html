<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Second Life YouTube Player</title>

<style>
html, body {
    margin:0;
    padding:0;
    background:#000;
    width:100%;
    height:100%;
    overflow:hidden;
}

#player {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:0;
}
</style>
</head>

<body>

<iframe id="player"
allow="autoplay; encrypted-media; fullscreen"
allowfullscreen>
</iframe>

<script>

// Get parameter from URL
function getParam(name)
{
    const url = new URL(window.location.href);
    return url.searchParams.get(name);
}

// Extract video ID if full URL is passed
function extractID(input)
{
    if(!input) return null;

    if(input.includes("watch?v="))
        return input.split("watch?v=")[1].substring(0,11);

    if(input.includes("youtu.be/"))
        return input.split("youtu.be/")[1].substring(0,11);

    if(input.includes("embed/"))
        return input.split("embed/")[1].substring(0,11);

    if(input.length === 11)
        return input;

    return null;
}

// Get video parameter
let raw = getParam("v");
let videoID = extractID(raw);

// Fallback video if nothing provided
if(!videoID)
{
    videoID = "dQw4w9WgXcQ";
}

// Build optimized embed URL
let embedURL =
"https://www.youtube-nocookie.com/embed/" + videoID +
"?autoplay=1" +
"&mute=0" +
"&rel=0" +
"&modestbranding=1" +
"&playsinline=1" +
"&enablejsapi=1";

document.getElementById("player").src = embedURL;

</script>

</body>
</html>
