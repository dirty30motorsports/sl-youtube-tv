<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SL Pro Media Player</title>

<style>
html, body{
margin:0;
padding:0;
background:#000;
width:100%;
height:100%;
overflow:hidden;
font-family:sans-serif;
}

#player{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

#overlay{
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:6px 10px;
border-radius:6px;
font-size:14px;
z-index:10;
}
</style>

</head>

<body>

<div id="overlay">SL Media Player</div>
<div id="player"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

function getParam(name)
{
    const url = new URL(window.location.href);
    return url.searchParams.get(name);
}

function extractID(input)
{
    if(!input) return null;

    if(input.includes("watch?v="))
        return input.split("watch?v=")[1].substring(0,11);

    if(input.includes("youtu.be/"))
        return input.split("youtu.be/")[1].substring(0,11);

    if(input.includes("embed/"))
        return input.split("embed/")[1].substring(0,11);

    if(input.length === 11)
        return input;

    return null;
}

let raw = getParam("v");
let videoID = extractID(raw);

if(!videoID)
videoID = "dQw4w9WgXcQ";

let player;

function onYouTubeIframeAPIReady()
{
player = new YT.Player('player',
{
videoId: videoID,

playerVars:
{
autoplay:1,
controls:1,
rel:0,
modestbranding:1,
playsinline:1
},

events:
{
'onReady': onPlayerReady
}
});
}

function onPlayerReady(event)
{
event.target.playVideo();
monitorAds();
}

function monitorAds()
{
setInterval(function(){

let skipBtn = document.querySelector(".ytp-ad-skip-button");

if(skipBtn)
skipBtn.click();

let adOverlay = document.querySelector(".ytp-ad-overlay-close-button");

if(adOverlay)
adOverlay.click();

},1000);
}

</script>

</body>
</html>
